<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <style>
    /* Basic Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .calendar {
      width: 100%;
      height: 100%;
      font-family: "Jost";
      overflow: hidden;
    }

    .fc-toolbar.fc-header-toolbar {
      margin-bottom: 0px !important;
    }

    .fc .fc-daygrid-body-natural .fc-daygrid-day-events {
      margin-bottom: 0px !important;
    }

    .fc .fc-daygrid-day-number {
      padding-top: 0px !important;
      padding-bottom: 0px !important;
    }

    .fc-widget-header {
      background-color: white;
    }

    .fc-dayGrid-view .fc-daygrid-day.fc-day-today .fc-daygrid-day-frame {
      border: 2px solid var(--fc-border-color) !important;
    }

    .fc-dayGridMonth-view .fc-daygrid-day.fc-day-today .fc-daygrid-day-frame {
      border: 2px solid var(--fc-border-color) !important;
    }

    .fc-timeGrid-view thead .fc-day.fc-day-today .fc-scrollgrid-sync-inner {
      border: 2px solid var(--fc-border-color) !important;
    }

    .fc-timeGridWeek-view thead .fc-col-header-cell.fc-day-today .fc-scrollgrid-sync-inner {
      border: 2px solid var(--fc-border-color) !important;
    }

    .fc .fc-timegrid-now-indicator-line {
      border-top-width: 3px !important;
    }

    .fc-scrollgrid {
      border-color: transparent !important;
    }

    .fc-scrollgrid td:last-of-type {
      border-right-color: transparent !important;
    }

    th {
      border-top-color: transparent;
      border-right-color: transparent !important;
      border-left-color: transparent !important;
    }

    .fc .fc-toolbar-title {
      font-size: var(--fc-title-font-size) !important;
    }

    .fc table {
      font-size: var(--fc-table-font-size) !important;
    }

    .fc-daygrid-event-dot~.fc-event-title {
      margin-bottom: 15px;
      white-space: normal !important;
      overflow: visible !important;
    }

    .fc .fc-daygrid-dot-event .fc-event-title {
      white-space: normal !important;
      overflow: visible !important;
    }

    .fc .fc-timegrid-event .fc-event-title {
      white-space: normal !important;
      overflow: visible !important;
    }

    .fc .fc-daygrid-dot-event {
      flex-wrap: wrap;
    }

    .fc .fc-daygrid-dot-event .fc-event-title {
      width: 100%;
      white-space: normal !important;
      overflow: visible !important;
      margin-top: 5px;
    }

    .fc .fc-daygrid-event-dot {
      width: 0px !important;
      height: 0px !important;
      border-radius: 50% !important;
      border-width: 8px !important;
    }

    .fc .fc-daygrid-dot-event .fc-event-time {
      font-weight: bold;
    }

    .fc .fc-daygrid-dot-event .fc-event-title {
      font-weight: normal;
      margin-left: 5px;
      margin-right: 5px;
    }

    .fc .fc-daygrid-body tr {
      height: 50% !important;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    #calendar {
      width: 100vw;
      height: 100vh;
      --fc-border-color: #555;
      --fc-page-bg-color: white;
      --fc-today-bg-color: '';
      --fc-now-indicator-color: red;
      --fc-event-border-color: #555;
      --fc-small-font-size: 0.85em;
      --fc-title-font-size: 1.75em;
      --fc-table-font-size: 1em;
    }
  </style>
</head>

<body>
  <div id="calendar" class="calendar"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
        initialView: 'dayGrid',
        initialDate: '2026-02-25',
        now: '2026-02-25T00:00:00',
        timeZone: 'America/Edmonton',
        contentHeight: '100%',
        expandRows: false,
        fixedWeekCount: false,
        slotDuration: '01:00:00',
        duration: { weeks: 2 },
        displayEventTime: true,
        displayEventEnd: true,
        weekends: true,
        nowIndicator: true,
        headerToolbar: { left: '', center: 'title', right: '' },
        eventTimeFormat: { hour: 'numeric', minute: '2-digit', omitZeroMinute: false, hour12: true, meridiem: 'short' },
        events: [
          { title: "Sidney Ford vs NAW-OB-5-THUNDER", start: "2026-02-28T21:00:00", end: "2026-02-28T22:15:00", backgroundColor: "#007BFF", textColor: "#ffffff" },
          { title: "Sidney Ford at NAW-OB-3-RQB ROYALS", start: "2026-03-04T20:30:00", end: "2026-03-04T21:45:00", backgroundColor: "#007BFF", textColor: "#ffffff" },
          { title: "Sidney Ford at NAW-OB-3-RQB ROYALS", start: "2026-03-04T22:45:00", end: "2026-03-04T23:30:00", backgroundColor: "#007BFF", textColor: "#ffffff" },
          { title: "Sidney Ford at NAW-OB-3-RQB ROYALS", start: "2026-03-04T22:45:00", end: "2026-03-04T23:30:00", backgroundColor: "#007BFF", textColor: "#ffffff" },
          { title: "Sidney Ford at NAW-OB-3-RQB ROYALS", start: "2026-03-04T22:45:00", end: "2026-03-04T23:30:00", backgroundColor: "#007BFF", textColor: "#ffffff" },
          { title: "Sidney Ford vs NAW-OB-1-ADRENALINE", start: "2026-03-07T22:00:00", end: "2026-03-07T23:15:00", backgroundColor: "#007BFF", textColor: "#ffffff" }
        ]
      });
      calendar.render();
    });
  </script>
</body>

</html>
